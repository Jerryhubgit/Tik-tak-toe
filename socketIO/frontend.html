<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>socketio | demo</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            height: 100vh;
            padding: 10px;
            align-items: center;
            justify-self: center; 
        }
        .app{
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .chats{
            width: 500px;
            height: 100%;
            border: 2px solid;
            padding: 5px;
        }
        .inputs{
            display: flex;
            gap: .5rem;
            margin: 20px 0;
            align-items: baseline;
        }
        button{
            padding: 10px 20px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: none;
        }
        input{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            width: 100%;
            padding: 5px;
        }
        .chat{
            padding: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }
        .chat:nth-child(odd){
            background-color: rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="chats">
            <p class="chat">Message recieved</p>
        </div>
        <form action="">
            <div class="inputs send">
                <label>Message</label>
                <input type="text" id="message-input">
                <button id="send-btn">send</button>
            </div>
            <div class="inputs join">
                <label>Room</label>
                <input type="text" id="room-input">
                <button id="join-btn">join</button>
            </div>
        </form>
    </div>

    <script type="module" src="backend.js"></script>
</body>
</html>
