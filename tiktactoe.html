<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            background-color: hsl(0,0%,90%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tiktactoe{
            background-color: white;
            /* max-width: 500px; */
            /* width: 90%; */
            place-items: center;
            padding: 20px;
            border: 1px solid rgba(0,0,0,.2);
            border-radius: 10px;
        }
        .header{
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            /* background-color: red; */
            align-items: center;
            width: 100%;
        }
        .header .refresh{
            padding: 10px;
            background-color: hsl(0, 0%, 90%);
            border: 1px solid rgba(0,0,0,.2);
            border-radius: 30px;
            cursor: pointer;
        }
        .header .space{
            visibility: hidden;
        }
        .header .players-turn{
            border: 1px solid rgba(0,0,0,.3);
            padding: 10px 20px;
            border-radius: 10px;
            background-color: hsl(295, 100%, 70%);
            border: 1px solid rgba(0,0,0,.05);
            color: white;
            font-weight: bold;
        }
        .gameboard{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gameboard .slots{
            border: 1px solid rgba(0,0,0,.1);
            background-color: hsl(0, 0%, 90%);
            padding: 18px 30px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    

    <div class="tiktactoe">
        <div class="header">
            <div class="space">space</div>
            <div class="players-turn">X TURN </div>
            <div class="refresh">refresh</div>
        </div>
        <div class="gameboard">
            <div class="slots">
                <h1>X</h1>
            </div>
            <div class="slots">
                <h1></h1>
            </div>
            <div class="slots">
                <h1>X</h1>
            </div>
            <div class="slots">
                <h1>X</h1>
            </div>
            <div class="slots">
                <h1>X</h1>
            </div>
            <div class="slots">
                <h1>O</h1>
            </div>
            <div class="slots">
                <h1>X</h1>
            </div>
            <div class="slots">
                <h1>O</h1>
            </div>
            <div class="slots">
                <h1>X</h1>
            </div>
        </div>
    </div>
</body>
</html>
