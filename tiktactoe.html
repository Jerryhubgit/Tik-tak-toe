<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            background-color: hsl(0,0%,10%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tiktactoe{
            background-color: hsl(0,0%,15%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* max-width: 500px; */
            /* width: 90%; */
            place-items: center;
            padding: 20px;
            border-radius: 10px;
        }
        .header{
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            /* background-color: red; */
            align-items: center;
            width: 100%;
        }
        .header .refresh{
            padding: 10px;
            background-color: hsl(0, 0%, 90%);
            border: 1px solid rgba(0,0,0,.2);
            border-radius: 30px;
            cursor: pointer;
        }
        .header .space{
            visibility: hidden;
        }
        .header .players-turn{
            border: 1px solid rgba(0,0,0,.3);
            padding: 10px 20px;
            border-radius: 10px;
            background-color: hsl(113, 98%, 15%);
            border: 1px solid rgba(0,0,0,.05);
            color: white;
            font-weight: bold;
        }
        .gameboard{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gameboard .slots{
            background-color: hsl(0,0%,20%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* padding: 18px 30px; */
            width: 100px;
            height: 100px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .slots h1{
            color: white;
        }
        .slots.won{
            background-color: hsla(115, 100%, 50%, 0.15);
            border: 1px solid hsl(120, 93%, 27%);
        }
    </style>
</head>
<body>
    

    <div class="tiktactoe">
        <div class="header">
            <div class="space">space</div>
            <div class="players-turn">X TURN </div>
            <div class="refresh">
                <i class="fa-solid fa-arrow-rotate-right"></i>
            </div>
        </div>
        <div class="gameboard">
            <div class="slots" data-play="1">
                <h1></h1>
            </div>
            <div class="slots" data-play="2">
                <h1></h1>
            </div>
            <div class="slots" data-play="3">
                <h1></h1>
            </div>
            <div class="slots" data-play="4">
                <h1></h1>
            </div>
            <div class="slots" data-play="5">
                <h1></h1>
            </div>
            <div class="slots" data-play="6">
                <h1></h1>
            </div>
            <div class="slots" data-play="7">
                <h1></h1>
            </div>
            <div class="slots" data-play="8">
                <h1></h1>
            </div>
            <div class="slots" data-play="9">
                <h1></h1>
            </div>
        </div>
    </div>

    <script type="module" defer src="script.js"></script>
</body>
</html>
